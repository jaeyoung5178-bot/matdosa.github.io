<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>맛도사 명함 · 인쇄 시안</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,400..600&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--camel:#D2B48C;--ink:#1B1B1B;--coffee:#4A3A2A;--cream:#F5F1EA;--sand:#E6DDD1}
body{font-family:'Pretendard',sans-serif;background:#DED3C4;color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:880px;margin:0 auto;padding:44px 22px 70px}
.head{text-align:center;margin-bottom:14px}
.head .eye{font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--coffee)}
.head h1{font-family:'Gowun Batang',serif;font-size:28px;font-weight:700;margin-top:8px}
.note{max-width:600px;margin:14px auto 30px;background:rgba(255,255,255,.5);border:1px solid rgba(74,58,42,.18);border-radius:12px;padding:12px 16px;font-size:12.5px;color:var(--coffee);text-align:center}
.spec{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-top:6px;font-size:11.5px}
.spec b{color:var(--ink)}
.toolbar{display:flex;gap:10px;justify-content:center;margin-bottom:26px;flex-wrap:wrap}
.btn{border:1px solid rgba(74,58,42,.3);background:rgba(255,255,255,.6);color:var(--coffee);border-radius:10px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn:hover{background:#fff}
.cards{display:flex;flex-direction:column;gap:34px;align-items:center}
.face{display:flex;flex-direction:column;align-items:center;gap:9px;width:100%}
.lbl{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--coffee)}
.bc{position:relative;width:100%;max-width:560px;aspect-ratio:91/55;background:var(--cream);border-radius:10px;overflow:hidden;box-shadow:0 26px 56px -24px rgba(27,27,27,.5),0 2px 6px rgba(27,27,27,.12)}
.guides{position:absolute;inset:0;pointer-events:none;display:none}
.guides.on{display:block}
.safe{position:absolute;inset:5%;border:1px dashed rgba(210,180,140,.9);border-radius:4px}
.bleed{position:absolute;inset:-3%;border:1px dashed rgba(200,80,80,.5)}
.front{display:flex;align-items:center;justify-content:center;height:100%}
.cardlogo{width:72%;max-width:340px;height:auto;display:block}
.back{display:flex;height:100%;align-items:center;padding:0 7%}
.back .info{flex:1;display:flex;flex-direction:column;gap:clamp(7px,2.4vw,13px)}
.back .ln{display:flex;align-items:center;gap:10px;font-size:clamp(10px,2.6vw,13.5px);color:var(--ink)}
.back .ln svg{width:15px;height:15px;flex:none;stroke:var(--camel);fill:none;stroke-width:1.7}
.back .divider{width:1px;align-self:stretch;background:rgba(74,58,42,.18);margin:14% 7%}
.back .qrwrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.back .qrbox{width:clamp(58px,17vw,86px);aspect-ratio:1;background:#fff;border-radius:7px;padding:5px;display:grid;place-items:center}
.back .qrbox img,.back .qrbox canvas{width:100%!important;height:100%!important}
.back .qrcap{font-size:8.5px;color:var(--coffee);letter-spacing:.04em}
@media print{body{background:#fff}.toolbar,.note,.head .eye,.lbl{display:none}}
</style>
</head>
